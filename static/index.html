<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NdraTube - Premium YouTube Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="logo">Ndra<span>Tube</span></h1>
            <p class="subtitle">Next-Generation YouTube Downloader</p>
        </header>

        <main>
            <div class="glass-card search-card">
                <form id="download-form">
                    <div class="input-group">
                        <input type="text" id="url-input" placeholder="Paste YouTube URL here..." required autocomplete="off">
                        <button type="submit" id="fetch-btn">
                            <span class="btn-text">Extract</span>
                            <div class="spinner hidden" id="fetch-spinner"></div>
                        </button>
                    </div>
                </form>
                <div id="error-message" class="error-msg hidden"></div>
            </div>

            <div id="results-container" class="results-container hidden">
                <div class="glass-card result-card">
                    <div class="video-info">
                        <div class="thumbnail-wrapper">
                            <img id="video-thumbnail" src="" alt="Video Thumbnail">
                            <div class="duration-badge" id="video-duration"></div>
                        </div>
                        <div class="info-content">
                            <h2 id="video-title"></h2>
                        </div>
                    </div>

                    <div class="formats-section">
                        <div class="tabs">
                            <button class="tab-btn active" data-target="video-formats">Video</button>
                            <button class="tab-btn" data-target="audio-formats">Audio</button>
                        </div>
                        
                        <div class="tab-content active" id="video-formats">
                            <!-- Video formats will be injected here -->
                        </div>
                        <div class="tab-content" id="audio-formats">
                            <!-- Audio formats will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
